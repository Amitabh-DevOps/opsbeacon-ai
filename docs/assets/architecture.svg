<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450" width="100%" height="100%">
  <!-- Background -->
  <rect width="1000" height="450" fill="#0f172a" rx="16" />
  
  <!-- Definitions for gradients and markers -->
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#4f46e5" />
    </linearGradient>
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#0891b2" />
    </linearGradient>
    <linearGradient id="amberGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>
    <linearGradient id="emeraldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#047857" />
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#94a3b8" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="50" y="50" fill="#f8fafc" font-family="system-ui, sans-serif" font-size="22" font-weight="bold">OpsBeacon AI - Serverless Architecture</text>
  <text x="50" y="75" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="14">Always-On DevOps Intelligence Agent workflow execution flow on AWS</text>

  <!-- AWS Boundary Box -->
  <rect x="50" y="110" width="700" height="280" rx="12" fill="none" stroke="#334155" stroke-width="2" stroke-dasharray="6,4" />
  <text x="65" y="135" fill="#475569" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" letter-spacing="1">AWS CLOUD BOUNDARY</text>

  <!-- Nodes -->
  
  <!-- EventBridge Scheduler -->
  <rect x="90" y="200" width="130" height="80" rx="10" fill="url(#amberGrad)" />
  <text x="155" y="235" fill="#ffffff" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" text-anchor="middle">EventBridge</text>
  <text x="155" y="255" fill="#ffffff" font-family="system-ui, sans-serif" font-size="11" opacity="0.9" text-anchor="middle">Scheduler</text>
  
  <!-- Lambda Function -->
  <rect x="290" y="200" width="140" height="80" rx="10" fill="url(#purpleGrad)" />
  <text x="360" y="235" fill="#ffffff" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" text-anchor="middle">AWS Lambda</text>
  <text x="360" y="255" fill="#ffffff" font-family="system-ui, sans-serif" font-size="11" opacity="0.9" text-anchor="middle">OpsBeacon Engine</text>

  <!-- Bedrock -->
  <rect x="520" y="150" width="160" height="80" rx="10" fill="url(#cyanGrad)" />
  <text x="600" y="185" fill="#ffffff" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" text-anchor="middle">Amazon Bedrock</text>
  <text x="600" y="205" fill="#ffffff" font-family="system-ui, sans-serif" font-size="11" opacity="0.9" text-anchor="middle">Nova Lite (AI)</text>

  <!-- SES -->
  <rect x="520" y="270" width="160" height="80" rx="10" fill="url(#blueGrad)" />
  <text x="600" y="305" fill="#ffffff" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" text-anchor="middle">Amazon SES</text>
  <text x="600" y="325" fill="#ffffff" font-family="system-ui, sans-serif" font-size="11" opacity="0.9" text-anchor="middle">Email Delivery</text>

  <!-- External RSS Feeds -->
  <rect x="280" y="20" width="160" height="60" rx="10" fill="#1e293b" stroke="#334155" stroke-width="2" />
  <text x="360" y="45" fill="#f8fafc" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" text-anchor="middle">DevOps RSS Feeds</text>
  <text x="360" y="62" fill="#64748b" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">AWS, K8s, CNCF, Docker</text>

  <!-- User Inbox -->
  <rect x="810" y="200" width="130" height="80" rx="10" fill="url(#emeraldGrad)" />
  <text x="875" y="235" fill="#ffffff" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" text-anchor="middle">DevOps Engineer</text>
  <text x="875" y="255" fill="#ffffff" font-family="system-ui, sans-serif" font-size="11" opacity="0.9" text-anchor="middle">Email Inbox</text>

  <!-- Connectors -->
  <!-- Scheduler -> Lambda -->
  <path d="M 220 240 L 280 240" fill="none" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)" />
  <text x="250" y="230" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">Daily Trigger</text>
  
  <!-- Lambda -> RSS -->
  <path d="M 350 200 L 350 90" fill="none" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)" />
  <text x="380" y="145" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10" text-anchor="left">1. Scrape (24h)</text>
  
  <!-- RSS -> Lambda -->
  <path d="M 370 90 L 370 200" fill="none" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)" />
  
  <!-- Lambda -> Bedrock -->
  <path d="M 430 220 L 510 180" fill="none" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)" />
  <text x="475" y="188" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle" transform="rotate(-26 475 188)">2. Synthesize</text>

  <!-- Bedrock -> Lambda -->
  <path d="M 510 200 L 430 240" fill="none" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)" />

  <!-- Lambda -> SES -->
  <path d="M 430 250 L 510 290" fill="none" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)" />
  <text x="475" y="280" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle" transform="rotate(26 475 280)">3. Compile</text>
  
  <!-- SES -> User -->
  <path d="M 680 310 L 875 310 L 875 290" fill="none" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)" />
  <text x="745" y="300" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">4. Deliver Email</text>
</svg>
